<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoScanner - CEP e IP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-10">

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-900 mb-2">Geo<span class="text-indigo-600">Scanner</span></h1>
            <p class="text-slate-500 text-sm italic">Ferramenta para Desenvolvedores</p>
        </header>

        <div class="flex flex-col gap-6">
            <section class="glass-card p-6 border border-slate-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-indigo-600 p-3 rounded-xl text-white shadow-md">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800">Localizar CEP</h2>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="cepInput" placeholder="01001-000" maxlength="9" inputmode="numeric"
                        class="flex-1 bg-slate-100 border-2 border-transparent rounded-xl px-4 py-3 focus:border-indigo-500 outline-none font-medium">
                    <button onclick="buscarCEP()" class="bg-indigo-600 text-white px-5 rounded-xl active:scale-90 transition-all">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div id="cepResult" class="space-y-2 hidden">
                    <div class="p-3 bg-slate-50 rounded-lg"><span class="text-[10px] text-indigo-500 font-bold block uppercase">Endereço</span><p id="resLogradouro" class="font-bold">-</p></div>
                    <div class="p-3 bg-slate-50 rounded-lg"><span class="text-[10px] text-indigo-500 font-bold block uppercase">Bairro</span><p id="resBairro" class="font-bold">-</p></div>
                    <div class="p-3 bg-slate-50 rounded-lg"><span class="text-[10px] text-indigo-500 font-bold block uppercase">Cidade/UF</span><p id="resCidade" class="font-bold">-</p></div>
                </div>
            </section>

            <section class="glass-card p-6 border border-slate-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-emerald-500 p-3 rounded-xl text-white shadow-md">
                        <i class="fas fa-globe"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800">Rastrear IP</h2>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="ipInput" placeholder="Ex: 8.8.8.8" inputmode="decimal"
                        class="flex-1 bg-slate-100 border-2 border-transparent rounded-xl px-4 py-3 focus:border-emerald-500 outline-none font-medium">
                    <button onclick="buscarIP()" class="bg-emerald-500 text-white px-5 rounded-xl active:scale-90 transition-all">
                        <i class="fas fa-crosshairs"></i>
                    </button>
                </div>
                <div id="ipResult" class="space-y-2 hidden">
                    <div class="p-3 bg-emerald-50 rounded-lg border border-emerald-100"><span class="text-[10px] text-emerald-600 font-bold block uppercase">Provedor</span><p id="resISP" class="font-bold">-</p></div>
                    <div class="p-3 bg-slate-50 rounded-lg"><span class="text-[10px] text-emerald-500 font-bold block uppercase">Localização</span><p id="resLocIP" class="font-bold">-</p></div>
                    <div class="p-3 bg-slate-50 rounded-lg"><span class="text-[10px] text-emerald-500 font-bold block uppercase">Coordenadas</span><p id="resCoords" class="font-bold">-</p></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        async function buscarCEP() {
            const val = document.getElementById('cepInput').value.replace(/\D/g, '');
            if(val.length !== 8) return alert('CEP Inválido');
            try {
                const r = await fetch(`https://viacep.com.br/ws/${val}/json/`);
                const d = await r.json();
                if(d.erro) throw new Error();
                document.getElementById('resLogradouro').innerText = d.logradouro || 'Sem logradouro';
                document.getElementById('resBairro').innerText = d.bairro || 'Centro';
                document.getElementById('resCidade').innerText = `${d.localidade}/${d.uf}`;
                document.getElementById('cepResult').classList.remove('hidden');
            } catch { alert('Erro ao buscar CEP'); }
        }

        async function buscarIP() {
            const val = document.getElementById('ipInput').value.trim();
            if(!val) return alert('Digite um IP');
            try {
                const r = await fetch(`https://ipapi.co/${val}/json/`);
                const d = await r.json();
                if(d.error) throw new Error();
                document.getElementById('resISP').innerText = d.org || 'Desconhecido';
                document.getElementById('resLocIP').innerText = `${d.city}, ${d.country_name}`;
                document.getElementById('resCoords').innerText = `${d.latitude}, ${d.longitude}`;
                document.getElementById('ipResult').classList.remove('hidden');
            } catch { alert('Erro ao buscar IP'); }
        }
    </script>
</body>
</html>
